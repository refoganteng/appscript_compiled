  <script>
    // Update nama user di UI
    if (currentUser) {
      document.getElementById('userNameDesktop').textContent = currentUser.nama;
      document.getElementById('userNameMobile').textContent = currentUser.nama;
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    }

    function logout() {
      // Hapus sesi dari localStorage
      localStorage.removeItem('coi_session');
      // Panggil server (opsional, untuk konsistensi) lalu redirect
      google.script.run
        .withSuccessHandler(() => {
          window.top.location.href = '<?= getScriptUrl() ?>?p=login';
        })
        .logout();
    }
  </script>
