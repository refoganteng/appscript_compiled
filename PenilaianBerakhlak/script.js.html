<script>
// ============================================================
// script.js.html — Client-side JS (SPA routing + API fetch)
// BPS Kabupaten Kepahiang — Penilaian BerAKHLAK
// ============================================================

/* ── State ──────────────────────────────────────────────── */
const App = {
  scriptUrl: window.location.href,
  token: sessionStorage.getItem('bps_token') || null,
  user: JSON.parse(sessionStorage.getItem('bps_user') || 'null'),
  currentPage: 'login',
  penilaianData: [],   // daftar pegawai yg harus dinilai
  nilaiMap: {},        // { nip: nilai }
  monitoringSort: { col: 'nama', asc: true },
};

/* ── API Helper ─────────────────────────────────────────── */
/**
 * Panggil fungsi server-side via google.script.run
 */
function api(action, params = {}) {
  return new Promise((resolve, reject) => {
    // console.log('[API Request]', action, params);
    google.script.run
      .withSuccessHandler(res => {
        // console.log('[API Response]', action, res);
        if (res && res.success) {
          resolve(res); // Kembalikan seluruh objek {success, data, summary, dll}
        } else {
          reject(new Error((res && res.error) ? res.error : 'Terjadi kesalahan sistem.'));
        }
      })
      .withFailureHandler(err => {
        console.error('[API Error]', action, err);
        reject(new Error(err.message || 'Gagal menghubungi server.'));
      })
      .executeAction(action, { token: App.token, ...params });
  });
}

/* ── Routing ─────────────────────────────────────────────── */
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + pageId);
  if (el) el.classList.add('active');

  // Sembunyikan header di login
  document.getElementById('app-header').style.display =
    pageId === 'login' ? 'none' : '';
  App.currentPage = pageId;
}

/* ── Auth ───────────────────────────────────────────────── */
async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('input-username').value.trim();
  const nip      = document.getElementById('input-nip').value.trim();
  const btn      = document.getElementById('btn-login');

  if (!username || !nip) { showToast('Isi username dan NIP terlebih dahulu.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:1.1rem;height:1.1rem;border-width:2px;margin:0"></span> Masuk...';

  try {
    const result = await api('login', { username, nip });
    if (!result.success) throw new Error(result.error);
    App.token = result.token;
    App.user  = result.pegawai;
    sessionStorage.setItem('bps_token', App.token);
    sessionStorage.setItem('bps_user',  JSON.stringify(App.user));
    showToast('Selamat datang, ' + App.user.nama + '! 👋', 'success');
    initBeranda();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Masuk';
  }
}

async function handleLogout() {
  try { await api('logout'); } catch (_) {}
  App.token = null;
  App.user  = null;
  sessionStorage.clear();
  document.getElementById('input-username').value = '';
  document.getElementById('input-nip').value = '';
  showPage('login');
  showToast('Anda telah keluar.', 'info');
}

/* ── Beranda ─────────────────────────────────────────────── */
async function initBeranda() {
  showPage('beranda');
  updateHeaderUser();

  // Avatar & nama
  const avatar = document.getElementById('beranda-avatar');
  const nama   = document.getElementById('beranda-nama');
  const periode = document.getElementById('beranda-periode');
  
  if (avatar) avatar.textContent = getInisialClient(App.user.nama);
  if (nama)   nama.textContent   = App.user.nama;

  // Tampilkan loading beranda
  document.getElementById('beranda-loading').style.display = 'flex';
  document.getElementById('beranda-content').style.opacity = '0';

  const p = getPeriodeBerjalan();
  if (periode) periode.textContent = formatPeriodeLabel(p);

  // Cek status submit (ini yg menentukan visibilitas card mulai)
  await refreshStatusSubmit(p);

  // Sembunyikan loading beranda
  document.getElementById('beranda-loading').style.display = 'none';
  document.getElementById('beranda-content').style.opacity = '1';

  // Tampilkan menu admin jika admin
  const menuAdmin = document.getElementById('menu-monitoring');
  if (menuAdmin) menuAdmin.style.display = App.user.isAdmin ? '' : 'none';
}

async function refreshStatusSubmit(periode) {
  const statusCard = document.getElementById('status-card');
  const btnMulaiWrap = document.getElementById('btn-mulai-penilaian-wrap');
  
  statusCard.innerHTML = `
    <div style="display:flex;align-items:center;gap:1rem;padding:.5rem">
      <div class="spinner" style="width:1.5rem;height:1.5rem;border-width:2px"></div>
      <div style="font-size:.875rem;color:var(--color-text-muted)">Memeriksa status penilaian...</div>
    </div>`;

  try {
    const res = await api('cekSudahSubmit', { periode });
    if (res.sudah) {
      statusCard.className = 'status-card sudah';
      statusCard.innerHTML = `
        <h3>✅ Sudah Submit Bulan Ini</h3>
        <p>Anda sudah menilai ${res.jumlahDinilai} rekan pada ${formatPeriodeLabel(periode)}</p>
        <p style="font-size:.75rem;opacity:.8;margin-top:.25rem">${formatDateTime(res.timestamp)}</p>`;
      if (btnMulaiWrap) btnMulaiWrap.style.display = 'none';
    } else {
      statusCard.className = 'status-card belum';
      statusCard.innerHTML = `
        <h3>⏳ Belum Submit Bulan Ini</h3>
        <p>Silakan mulai penilaian untuk periode ${formatPeriodeLabel(periode)}</p>`;
      if (btnMulaiWrap) btnMulaiWrap.style.display = 'flex';
    }
  } catch (err) {
    statusCard.innerHTML = `<div style="color:var(--color-danger);font-size:.875rem">Gagal memuat status: ${err.message}</div>`;
  }
}

/* ── Penilaian ───────────────────────────────────────────── */
async function initPenilaian() {
  showPage('penilaian');
  App.nilaiMap = {};

  const container = document.getElementById('penilaian-list');
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><p>Memuat daftar pegawai...</p></div>';

  try {
    const result = await api('getPegawaiUntukDinilai');
    App.penilaianData = result.data || result;
    renderPenilaianList();
  } catch (err) {
    container.innerHTML = `<div class="loading-center"><p style="color:var(--color-danger)">❌ ${err.message}</p></div>`;
  }
}

const SKALA_LABEL = ['', 'Sangat Kurang', 'Kurang', 'Cukup', 'Baik', 'Sangat Baik'];

function renderPenilaianList() {
  const container = document.getElementById('penilaian-list');
  const total     = App.penilaianData.length;

  if (total === 0) {
    container.innerHTML = '<div class="loading-center"><p>Tidak ada rekan untuk dinilai.</p></div>';
    return;
  }

  container.innerHTML = App.penilaianData.map((p, i) => `
    <div class="pegawai-card" id="card-${p.nip}">
      <div class="avatar">${p.inisial}</div>
      <div class="pegawai-info">
        <div class="pegawai-nama">${p.nama}</div>
        <div class="pegawai-nip">NIP: ${p.nip}</div>
      </div>
      <div style="text-align:center;min-width:160px">
        <div class="star-rating" id="stars-${p.nip}">
          ${[5,4,3,2,1].map(v => `
            <input type="radio" name="nilai_${p.nip}" id="star_${p.nip}_${v}" value="${v}">
            <label for="star_${p.nip}_${v}" title="${SKALA_LABEL[v]}" 
                   onmouseover="showStarLabel('${p.nip}',${v})" 
                   onmouseout="showStarLabel('${p.nip}',${App.nilaiMap[p.nip]||0})">★</label>
          `).join('')}
        </div>
        <div class="star-tooltip" id="tooltip-${p.nip}">Pilih nilai</div>
      </div>
    </div>
  `).join('');

  // Attach change listeners
  App.penilaianData.forEach(p => {
    [1,2,3,4,5].forEach(v => {
      const input = document.getElementById(`star_${p.nip}_${v}`);
      if (input) input.addEventListener('change', () => onNilaiChange(p.nip, v));
    });
  });

  updateProgress();
}

function showStarLabel(nip, val) {
  const el = document.getElementById('tooltip-' + nip);
  if (!el) return;
  el.textContent = val ? SKALA_LABEL[val] : 'Pilih nilai';
}

function onNilaiChange(nip, nilai) {
  App.nilaiMap[nip] = nilai;
  showStarLabel(nip, nilai);
  const card = document.getElementById('card-' + nip);
  if (card) card.classList.add('rated');
  updateProgress();
}

function updateProgress() {
  const total = App.penilaianData.length;
  const done  = Object.keys(App.nilaiMap).length;
  const pct   = total > 0 ? (done / total) * 100 : 0;

  document.getElementById('progress-label').textContent  = `${done} dari ${total} pegawai dinilai`;
  document.getElementById('progress-fill').style.width   = pct + '%';

  const btnSubmit = document.getElementById('btn-submit-penilaian');
  if (btnSubmit) btnSubmit.disabled = done < total;
}

function openSubmitModal() {
  const total = App.penilaianData.length;
  const done  = Object.keys(App.nilaiMap).length;
  if (done < total) { showToast('Berikan nilai untuk semua rekan terlebih dahulu.', 'error'); return; }
  document.getElementById('modal-konfirmasi').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function handleSubmitPenilaian() {
  closeModal('modal-konfirmasi');
  const btn = document.getElementById('btn-submit-penilaian');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:1rem;height:1rem;border-width:2px;margin:0"></span> Menyimpan...';

  const penilaianList = App.penilaianData.map(p => ({
    nipDinilai:  p.nip,
    namaDinilai: p.nama,
    nilai:       App.nilaiMap[p.nip],
  }));

  try {
    const res = await api('submitPenilaian', { penilaianList });
    if (!res.success && res.error) throw new Error(res.error);
    showToast('Penilaian berhasil disimpan! 🎉', 'success');
    setTimeout(() => initBeranda(), 1500);
  } catch (err) {
    showToast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Submit Penilaian';
  }
}

/* ── Rekap ───────────────────────────────────────────────── */
async function initRekap(targetPeriode) {
  showPage('rekap');
  
  const sel = document.getElementById('rekap-select-periode');
  const currentP = targetPeriode || getPeriodeBerjalan();

  // Load daftar periode jika belum ada
  if (sel.options.length <= 1) {
    try {
      const res = await api('getListPeriode');
      const periodes = res.data || res;
      sel.innerHTML = periodes.map(p =>
        `<option value="${p}" ${p === currentP ? 'selected' : ''}>${formatPeriodeLabel(p)}</option>`
      ).join('');
    } catch (err) {
      console.error('Gagal memuat periode:', err);
    }
  }

  document.getElementById('rekap-periode').textContent = formatPeriodeLabel(currentP);

  const scoreEl = document.getElementById('rekap-score-num');
  const starsEl = document.getElementById('rekap-score-stars');
  const penilaiEl = document.getElementById('rekap-jumlah-penilai');
  const labelEl   = document.getElementById('rekap-score-label');
  scoreEl.textContent = '...';

  try {
    const res = await api('getRekapPegawai', { periode: currentP });
    const data = res.data || res;
    if (data.jumlahPenilai === 0 || data.rataRata === null) {
      scoreEl.textContent  = '—';
      starsEl.textContent  = '—';
      penilaiEl.textContent = '0 penilai';
      labelEl.textContent   = 'Belum ada penilaian';
    } else {
      scoreEl.textContent  = data.rataRata.toFixed(2);
      starsEl.textContent  = '★'.repeat(Math.round(data.rataRata)) + '☆'.repeat(5 - Math.round(data.rataRata));
      penilaiEl.textContent = data.jumlahPenilai + ' penilai';
      labelEl.textContent   = SKALA_LABEL[Math.round(data.rataRata)] || '';
    }
  } catch (err) {
    scoreEl.textContent = '—';
    showToast(err.message, 'error');
  }
}

/* ── Monitoring ──────────────────────────────────────────── */
let monitoringData = [];
let rekapData      = [];
let activeMonTab   = 'status';

async function initMonitoring() {
  showPage('monitoring');
  activeMonTab = 'status';
  switchMonTab('status');

  // Load daftar periode
  try {
    const res     = await api('getListPeriode');
    const periodes = res.data || res;
    const sel = document.getElementById('select-periode');
    sel.innerHTML = periodes.map(p =>
      `<option value="${p}" ${p === getPeriodeBerjalan() ? 'selected' : ''}>${formatPeriodeLabel(p)}</option>`
    ).join('');
  } catch (err) {
    showToast(err.message, 'error');
    return;
  }

  await loadMonitoringData();
}

function switchMonTab(tab) {
  activeMonTab = tab;
  document.getElementById('tab-status').style.display = tab === 'status' ? '' : 'none';
  document.getElementById('tab-rekap').style.display  = tab === 'rekap'  ? '' : 'none';
  document.getElementById('tab-btn-status').classList.toggle('active', tab === 'status');
  document.getElementById('tab-btn-rekap').classList.toggle('active',  tab === 'rekap');

  if (tab === 'rekap' && rekapData.length === 0) {
    loadRekapData();
  }
}

function onPeriodeChange() {
  rekapData = []; // reset agar reload ulang saat ganti periode
  loadMonitoringData();
  if (activeMonTab === 'rekap') loadRekapData();
}

async function loadMonitoringData() {
  const periode = document.getElementById('select-periode').value;
  const tbody   = document.getElementById('monitoring-tbody');
  tbody.innerHTML = `<tr><td colspan="5" style="padding:2rem;text-align:center">
    <div class="spinner"></div></td></tr>`;

  try {
    const res  = await api('getStatusSubmit', { periode });
    const d    = res.data || res;
    monitoringData = d.data || d;
    const summary  = d.summary || res.summary;

    document.getElementById('sum-total').textContent  = summary.total;
    document.getElementById('sum-sudah').textContent  = summary.sudah;
    document.getElementById('sum-belum').textContent  = summary.belum;
    document.getElementById('sum-persen').textContent = summary.persentase + '%';
    document.getElementById('monitoring-progress').style.width = summary.persentase + '%';

    renderMonitoringTable(monitoringData);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="5" style="padding:2rem;text-align:center;color:var(--color-danger)">❌ ${err.message}</td></tr>`;
  }
}

async function handleExportRekap() {
  const periode = document.getElementById('select-periode').value;
  const btn = document.getElementById('btn-export-rekap');
  const oldHtml = btn.innerHTML;
  
  try {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:1rem;height:1rem;border-width:2px;margin:0"></span> Mengekspor...';
    
    const res = await api('exportRekapBulanan', { periode });
    showToast(`Berhasil ekspor ke sheet: ${res.sheetName} 🎉`, 'success');
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = oldHtml;
  }
}

async function loadRekapData() {
  const periode   = document.getElementById('select-periode').value;
  const tbody     = document.getElementById('rekap-tbody');
  const podiumWrap = document.getElementById('podium-wrap');
  tbody.innerHTML = `<tr><td colspan="6" style="padding:2rem;text-align:center"><div class="spinner"></div></td></tr>`;
  podiumWrap.innerHTML = '';

  try {
    const res = await api('getRekapAdmin', { periode });
    rekapData = res.data || res;
    renderPodium(rekapData);
    renderRekapTable(rekapData);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" style="padding:2rem;text-align:center;color:var(--color-danger)">❌ ${err.message}</td></tr>`;
  }
}

function renderPodium(data) {
  const podiumWrap = document.getElementById('podium-wrap');
  if (!data || data.length === 0) { podiumWrap.innerHTML = ''; return; }

  const top3 = data.slice(0, 3);
  const order = [top3[1], top3[0], top3[2]].filter(Boolean);
  const posClass = [top3[1] ? 'podium-2' : '', 'podium-1', top3[2] ? 'podium-3' : ''].filter(Boolean);
  
  // Medal SVG
  const medalSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`;
  const posNums = [2, 1, 3];

  let html = '';
  order.forEach((p, i) => {
    const cls = posClass[i];
    const pos = posNums[i];
    const stars = '★'.repeat(Math.round(p.rataRata)) + '☆'.repeat(5 - Math.round(p.rataRata));
    const inisial = getInisialClient(p.nama);
    html += `
      <div class="podium-item ${cls}">
        <div class="podium-avatar">
          <span class="crown">${pos === 1 ? medalSvg : ''}</span>
          ${inisial}
        </div>
        <div class="podium-name">${p.nama.split(' ').slice(0,2).join(' ')}</div>
        <div class="podium-score">${p.rataRata.toFixed(2)}</div>
        <div class="podium-stars" style="font-size:.65rem;letter-spacing:1px">${stars}</div>
        <div class="podium-block">${pos}</div>
      </div>`;
  });
  podiumWrap.innerHTML = html;
}

function renderRekapTable(data) {
  const tbody = document.getElementById('rekap-tbody');
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="padding:2rem;text-align:center;color:var(--color-text-muted)">Belum ada data rekap.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((r, i) => {
    const stars    = '★'.repeat(Math.round(r.rataRata)) + '☆'.repeat(5 - Math.round(r.rataRata));
    const kategori = SKALA_LABEL[Math.round(r.rataRata)] || '—';
    const rankEl   = i === 0 ? `<span class="rank-medal" style="color:#f59e0b">#1</span>` :
                     i === 1 ? `<span class="rank-medal" style="color:#94a3b8">#2</span>` :
                     i === 2 ? `<span class="rank-medal" style="color:#f97316">#3</span>` :
                     `<span class="rank-num">${i + 1}</span>`;
    const rowStyle = i === 0 ? 'background:rgba(245,158,11,.05);font-weight:600' : '';
    return `
      <tr style="${rowStyle}">
        <td style="text-align:center">${rankEl}</td>
        <td style="font-weight:500">${r.nama}</td>
        <td style="text-align:center;font-weight:700;font-size:1rem">${r.rataRata.toFixed(2)}</td>
        <td style="text-align:center;color:var(--color-accent);font-size:1rem;letter-spacing:1px">${stars}</td>
        <td style="text-align:center">
          <span class="badge badge-primary">${r.jumlahPenilai} penilai</span>
        </td>
        <td style="text-align:center">
          <span class="badge ${getBadgeClass(r.rataRata)}">${kategori}</span>
        </td>
      </tr>`;
  }).join('');
}

function getBadgeClass(nilai) {
  if (nilai >= 4.5) return 'badge-success';
  if (nilai >= 3.5) return 'badge-primary';
  if (nilai >= 2.5) return 'badge-warning';
  return 'badge-danger';
}

function getInisialClient(nama) {
  if (!nama) return '?';
  return nama.trim().substring(0, 2).toUpperCase();
}

function renderMonitoringTable(data) {
  const tbody = document.getElementById('monitoring-tbody');
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="padding:2rem;text-align:center;color:var(--color-text-muted)">Belum ada data.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td style="font-weight:600">${r.nama}</td>
      <td><code style="font-size:.8em">${r.nip}</code></td>
      <td>
        <span class="badge ${r.sudahSubmit ? 'badge-success' : 'badge-danger'}" style="gap:.25rem">
          ${r.sudahSubmit 
            ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Sudah' 
            : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Belum'}
        </span>
      </td>
      <td style="font-size:.8125rem;color:var(--color-text-muted)">
        ${r.sudahSubmit ? formatDateTime(r.timestamp) + ' <span class="badge badge-primary">' + r.jumlahDinilai + ' dinilai</span>' : '—'}
      </td>
    </tr>
  `).join('');
}

function sortMonitoring(col) {
  if (App.monitoringSort.col === col) App.monitoringSort.asc = !App.monitoringSort.asc;
  else { App.monitoringSort.col = col; App.monitoringSort.asc = true; }

  const sorted = [...monitoringData].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (typeof av === 'boolean') { av = av ? 1 : 0; bv = bv ? 1 : 0; }
    if (typeof av === 'string')  return App.monitoringSort.asc ? av.localeCompare(bv,'id') : bv.localeCompare(av,'id');
    return App.monitoringSort.asc ? av - bv : bv - av;
  });
  renderMonitoringTable(sorted);
}

/* ── Theme ───────────────────────────────────────────────── */
function initTheme() {
  const saved = localStorage.getItem('bps_theme');
  const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (preferDark ? 'dark' : 'light');
  setTheme(theme);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.innerHTML = theme === 'dark' 
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  localStorage.setItem('bps_theme', theme);
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  setTheme(cur === 'dark' ? 'light' : 'dark');
}

/* ── Header User ─────────────────────────────────────────── */
function updateHeaderUser() {
  if (!App.user) return;
  const av = document.getElementById('header-avatar');
  const nm = document.getElementById('header-nama');
  if (av) av.textContent = getInisialClient(App.user.nama);
  if (nm) nm.textContent = App.user.nama;
}

/* ── Toast ───────────────────────────────────────────────── */
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  
  const icon = type === 'success' 
    ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
    : type === 'error'
    ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;

  toast.innerHTML = `
    <div style="display:flex;align-items:center;gap:.625rem">
      <span style="display:flex">${icon}</span>
      <span>${msg}</span>
    </div>
  `;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('toast-out');
    setTimeout(() => toast.remove(), 350);
  }, 4000);
}

/* ── Helpers ─────────────────────────────────────────────── */
function getPeriodeBerjalan() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1); // Mundur 1 bulan (N-1)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  return `${y}-${m}`;
}

function formatPeriodeLabel(p) {
  if (!p) return '';
  const [y, m] = p.split('-');
  const bulan = ['','Januari','Februari','Maret','April','Mei','Juni',
                  'Juli','Agustus','September','Oktober','November','Desember'];
  return `${bulan[parseInt(m,10)]} ${y}`;
}

function formatDateTime(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts.replace(/-/g, '/'));
    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    return d.toLocaleDateString('id-ID', options);
  } catch (_) { return ts; }
}

function goBack() {
  initBeranda();
}

/* ── Accordion ───────────────────────────────────────────── */
function toggleAccordion(id) {
  const body   = document.getElementById('acc-body-' + id);
  const header = document.getElementById('acc-header-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  header.classList.toggle('open', !isOpen);
}

/* ── Init ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initTheme();

  // Cek session yang masih aktif
  if (App.token && App.user) {
    api('getSession').then(res => {
      if (res && res.pegawai) {
        App.user = res.pegawai;
        sessionStorage.setItem('bps_user', JSON.stringify(App.user));
        initBeranda();
      } else {
        showPage('login');
      }
    }).catch(() => showPage('login'));
  } else {
    showPage('login');
  }
});
</script>
